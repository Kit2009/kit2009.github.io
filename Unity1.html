<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>實境冒險遊戲</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f7f4eb;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png'); /* 請確保背景圖片名稱為 bg.png */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
        }

        /* 頂部深藍綠色實時時間狀態欄 */
        .top-time-bar {
            background-color: #1f8195;
            color: #ffffff;
            text-align: center;
            padding: 12px 0;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            width: 100%;
            z-index: 10;
        }

        /* 玩家資訊與積分狀態列 */
        .info-bar {
            background-color: #f4efe2;
            color: #111111;
            display: flex;
            justify-content: space-between;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 10;
        }

        /* 主要卡片容器 */
        .content-body {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 半透明淡青綠色圓角卡片 */
        .card {
            background-color: rgba(225, 241, 239, 0.85);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 畫面切換控制 */
        #home-view { display: block; }
        #ready-view { display: none; }
        #scan-view { display: none; }

        .card h2 {
            color: #111111;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .input-field {
            width: 100%;
            height: 54px;
            border: none;
            background-color: #ffffff;
            border-radius: 20px;
            padding: 0 20px;
            font-size: 18px;
            text-align: center;
            color: #333;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
            outline: none;
            margin-bottom: 30px;
        }

        /* 經典綠色大按鈕 */
        .btn {
            width: 100%;
            height: 56px;
            border: none;
            background-color: #00a854;
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 168, 84, 0.3);
            transition: background-color 0.2s, transform 0.1s;
        }

        /* 掃描介面的藍綠色按鈕 */
        .btn-blue {
            background-color: #1f8195;
            box-shadow: 0 6px 15px rgba(31, 129, 149, 0.3);
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* 倒數計時器排版 */
        .timer-label {
            color: #1f8195;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .timer-display {
            color: #1f8195;
            font-size: 46px;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* 📷 相機正方形黑色框 */
        .scanner-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #000000;
            border-radius: 24px;
            overflow: hidden;
            margin: 0 auto 25px auto;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        /* 隱藏 html5-qrcode 內部自帶的元件 */
        #reader button { display: none; }
        #reader img { display: none; }

        /* 🟢🔴 下方動態長條 */
        .status-bar {
            width: 100%;
            height: 10px;
            background-color: #00a854; /* 預設綠色 */
            border-radius: 5px;
            margin-bottom: 25px;
            transition: background-color 0.3s ease;
        }

        .status-bar.error {
            background-color: #d93838; /* 失敗變紅色 */
        }
    </style>
</head>
<body>

    <div class="bg-container">
        
        <div id="global-header" style="display: none;">
            <div class="top-time-bar" id="real-time">00:00:00</div>
            <div class="info-bar">
                <div id="display-player-name">玩家名稱</div>
                <div id="display-score">積分：0000</div>
            </div>
        </div>

        <div class="content-body">

            <div id="home-view" class="card">
                <h2>玩家名稱</h2>
                <input type="text" id="player-name" class="input-field" placeholder="請輸入名字..." autocomplete="off">
                <button class="btn" onclick="loginGame()">登入遊戲</button>
            </div>

            <div id="ready-view" class="card">
                <div class="timer-label">尚餘時間</div>
                <div class="timer-display" id="ready-clock">00:20:00</div>
                <button class="btn" onclick="startGameClock()">開始遊戲</button>
            </div>

            <div id="scan-view" class="card">
                <div class="timer-label">尚餘時間</div>
                <div class="timer-display" id="scan-clock">00:20:00</div>
                
                <div class="scanner-box" id="reader"></div>
                
                <div class="status-bar" id="indicator-bar"></div>
                
                <button class="btn btn-blue" onclick="triggerScan()">掃 描</button>
            </div>

        </div>
    </div>

    <script>
        let currentScore = 0;
        let html5QrcodeScanner = null;
        let countdownInterval = null;
        let timeLeftSeconds = 20 * 60; // 20 分鐘 = 1200 秒

        // ⭐ 新增：用來紀錄已經被成功挑戰過、拿過分數嘅任務清單 (防重複限制)
        let finishedTasksLog = {}; 

        // --- 1. 頂部實時時鐘功能 ---
        function updateRealTime() {
            const now = new Date();
            document.getElementById('real-time').innerText = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }
        setInterval(updateRealTime, 1000);
        updateRealTime();

        // --- 2. 畫面一：玩家登入邏輯 ---
        function loginGame() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert("請輸入名字！");
            
            document.getElementById('display-player-name').innerText = name;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('global-header').style.display = 'block';
            document.getElementById('ready-view').style.display = 'block';
        }

        // --- 3. 畫面二：點擊「開始遊戲」，立刻開展倒數計時並換頁 ---
        function startGameClock() {
            document.getElementById('ready-view').style.display = 'none';
            document.getElementById('scan-view').style.display = 'block';
            
            startCountdown(); // 啟動時間倒數
            initCamera();       // 換頁後立刻初始化鏡頭
        }

        // --- 4. 初始化並開啟相機鏡頭 ---
        function initCamera() {
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: (w, h) => ({ width: w * 0.7, height: h * 0.7 }) },
                () => {}, 
                () => {}  
            ).catch(err => {
                console.error("相機無法正常開啟: ", err);
                alert("請允許網頁存取相機權限！並確保網址使用的是 https 連線！");
            });
        }

        // --- 5. 畫面三：按下「掃描」按鈕後單幀圖像捕捉解碼 ---
        function triggerScan() {
            if (!html5QrcodeScanner) return;
            
            let isDecoded = false;
            let checkScan = setInterval(() => {
                const video = document.querySelector("#reader video");
                if (!video) return clearInterval(checkScan);

                // 捕捉畫面進行解碼
                html5QrcodeScanner.scanFile(captureVideoFrame(video))
                    .then(decodedText => {
                        clearInterval(checkScan);
                        isDecoded = true;
                        handleScanResult(decodedText.trim()); // 進入解讀邏輯
                    })
                    .catch(() => {});
            }, 100);

            // 1.5 秒後如果還沒解開，就判定為掃描失敗
            setTimeout(() => {
                clearInterval(checkScan);
                if (!isDecoded) {
                    triggerScanFailure(); // 紅條警告 3 秒
                }
            }, 1500);
        }

        function captureVideoFrame(video) {
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas;
        }

        // --- 6. 🧠 判斷與解讀 QR 碼內容（含防重複限制及重置機制） ---
        function handleScanResult(codeText) {
            const lowerCode = codeText.toLowerCase();

            // 🔄 重置指令判定
            if (lowerCode === 'reset') {
                resetWholeGame();
                return;
            }

            // 🎯 模擬關卡任務碼判定 (001, 002, 003)
            if (lowerCode === '001' || lowerCode === '002' || lowerCode === '003') {
                
                // 🛑 核心防重複限制檢查：如果這個碼已經存在於紀錄 log 入面
                if (finishedTasksLog[lowerCode]) {
                    alert(`這個任務你已經大功告成，拿過分數囉！請去挑戰其他關卡。`);
                    return; // 直接攔截攔阻，不給予任何獎勵與換頁
                }

                // 🟢 首次解鎖成功：登錄 log 鎖定此關卡防止二刷
                finishedTasksLog[lowerCode] = true;
                
                // 模擬關卡完成加分：每次加 200 分
                currentScore += 200;
                const formattedScore = String(currentScore).padStart(4, '0');
                document.getElementById('display-score').innerText = `積分：${formattedScore}`;
                
                alert(`🎉 成功識別條碼 [${codeText}]！\n防重複挑戰鎖定已開啟，恭喜獲得 200 分！`);
                
            } else {
                // 掃到其他任何不認得的內容，直接判定失敗紅條
                triggerScanFailure();
            }
        }

        // --- 7. 🔴 掃描失敗反饋（綠條變紅 3 秒） ---
        function triggerScanFailure() {
            const bar = document.getElementById('indicator-bar');
            bar.classList.add('error');
            setTimeout(() => { bar.classList.remove('error'); }, 3000);
        }

        // --- 8. 🔄 重置遊戲功能（清空紀錄與分數） ---
        function resetWholeGame() {
            clearInterval(countdownInterval);

            // 還原狀態
            currentScore = 0;
            timeLeftSeconds = 20 * 60; 
            finishedTasksLog = {}; // ⭐ 徹底清空防重複鎖定的紀錄，任務可以重新刷
            
            document.getElementById('display-score').innerText = `積分：0000`;
            document.getElementById('ready-clock').innerText = "00:20:00";
            document.getElementById('scan-clock').innerText = "00:20:00";

            alert("🔄 檢測到 Reset 管理員指令：所有積分、計時以及任務完成紀錄已全部重置！");

            // 回到畫面二
            document.getElementById('scan-view').style.display = 'none';
            document.getElementById('ready-view').style.display = 'block';
            
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().catch(() => {});
            }
        }

        // --- ⏳ 20 分鐘倒數計時核心功能 ---
        function startCountdown() {
            clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                if (timeLeftSeconds <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('ready-clock').innerText = "00:00:00";
                    document.getElementById('scan-clock').innerText = "00:00:00";
                    alert("遊戲時間到！");
                    return;
                }
                timeLeftSeconds--;
                
                const hrs = String(Math.floor(timeLeftSeconds / 3600)).padStart(2, '0');
                const mins = String(Math.floor((timeLeftSeconds % 3600) / 60)).padStart(2, '0');
                const secs = String(timeLeftSeconds % 60).padStart(2, '0');
                
                const timeStr = `${hrs}:${mins}:${secs}`;
                
                document.getElementById('ready-clock').innerText = timeStr;
                document.getElementById('scan-clock').innerText = timeStr;
            }, 1000);
        }
    </script>
</body>
</html>
