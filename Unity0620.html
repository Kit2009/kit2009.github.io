<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>實境冒險遊戲</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            min-height: 100%;
            width: 100%;
            background-color: #f7f4eb;
            /* 🔴 關鍵修正：允許網頁垂直捲動，防止內容被遮擋 */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png'); /* 請確保背景圖片名稱為 bg.png */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1; /* 放入底層，不影響內容捲動 */
        }

        /* 頂部深藍綠色實時時間狀態欄 */
        .top-time-bar {
            background-color: #1f8195;
            color: #ffffff;
            text-align: center;
            padding: 12px 0;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* 玩家資訊與積分狀態列 */
        .info-bar {
            background-color: #f4efe2;
            color: #111111;
            display: flex;
            justify-content: space-between;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 45px; /* 貼在時間欄下方 */
            z-index: 10;
        }

        /* 主要內容排版容器 */
        .content-body {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 改為靠上對齊，方便內容多時向下延伸 */
            padding: 30px 20px 60px 20px; /* 加大底部留白，確保捲動到最底時按鈕好按 */
        }

        /* 半透明淡青綠色圓角卡片 */
        .card {
            background-color: rgba(225, 241, 239, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
            text-align: center;
            animation: fadeIn 0.4s ease-out;
            height: auto; /* 🟢 讓卡片高度隨內容自動伸縮 */
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 畫面切換控制 */
        #home-view { display: block; }
        #ready-view { display: none; }
        #scan-view { display: none; }
        #task-view { display: none; }

        .card h2 {
            color: #111111;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .input-field {
            width: 100%;
            height: 54px;
            border: none;
            background-color: #ffffff;
            border-radius: 20px;
            padding: 0 20px;
            font-size: 18px;
            text-align: center;
            color: #333;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
            outline: none;
            margin-bottom: 20px;
        }

        /* 按鈕基礎樣式 */
        .btn {
            width: 100%;
            height: 56px;
            border: none;
            background-color: #00a854;
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 168, 84, 0.3);
            transition: background-color 0.2s, transform 0.1s;
            margin-bottom: 20px;
        }

        .btn-blue {
            background-color: #1f8195;
            box-shadow: 0 6px 15px rgba(31, 129, 149, 0.3);
            cursor: default;
            margin-bottom: 0;
        }

        /* Task 1 專屬：粉紫色上載按鈕 */
        .btn-upload {
            background-color: #e2a4f4;
            color: #000000;
            box-shadow: 0 6px 15px rgba(226, 164, 244, 0.4);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* 返回掃描紅橘色小按鈕 */
        .btn-back {
            display: inline-block;
            width: auto;
            height: auto;
            padding: 8px 18px;
            background-color: #ff6b6b;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
            border: none;
            cursor: pointer;
        }

        .btn:active, .btn-back:active, .btn-upload:active {
            transform: scale(0.97);
        }

        /* ⏳ 倒數計時器排版 */
        .timer-label {
            color: #1f8195;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .timer-display {
            color: #1f8195;
            font-size: 46px;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* 📷 相機正方形框（大廳鏡頭、Task 4、Task 5 共用） */
        .scanner-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #000000;
            border-radius: 24px;
            overflow: hidden;
            margin: 0 auto 25px auto;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        #reader button, #task4-reader button, #task5-reader button { display: none !important; }
        #reader img, #task4-reader img, #task5-reader img { display: none !important; }
        #reader, #task4-reader, #task5-reader { border: none !important; }

        /* 🟢🔴 下方動態長條 */
        .status-bar {
            width: 100%;
            height: 10px;
            background-color: #00a854; 
            border-radius: 5px;
            margin-bottom: 25px;
            transition: background-color 0.3s ease;
        }

        .status-bar.error {
            background-color: #d93838; 
        }

        /* --- Task 關卡畫面基礎排版 --- */
        .task-header {
            text-align: left;
            color: #1f8195;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .task-title {
            text-align: left;
            color: #1f8195;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .task-description {
            text-align: left;
            color: #1f8195;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .task-footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 25px;
        }

        .points-award {
            color: #1f8195;
            font-size: 18px;
            font-weight: bold;
        }

        /* --- 🎂 Task 3 專屬排版樣式 --- */
        .birthday-container {
            display: none; 
            width: 100%;
            margin-bottom: 15px;
        }

        .birthday-label-row {
            display: flex;
            justify-content: space-between;
            color: #1f8195;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        .birthday-row { margin-bottom: 15px; }
        .birthday-inputs { display: flex; justify-content: space-between; gap: 15px; }

        .birthday-input {
            width: 46%;
            height: 44px;
            border: none;
            background-color: #ffffff;
            border-radius: 22px;
            padding: 0 15px;
            font-size: 16px;
            text-align: center;
            color: #333;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.06);
            outline: none;
        }

        .birthday-line {
            width: 100%;
            height: 6px;
            background-color: #d93838; 
            border-radius: 3px;
            margin-top: 8px;
            transition: background-color 0.3s ease;
        }

        .birthday-line.correct { background-color: #00a854; }

        /* --- 🍾 Task 4 專屬排版樣式 --- */
        .task4-scanner-container {
            display: none;
            width: 100%;
        }

        /* --- 🎤 Task 5 專屬雙頁面排版樣式 --- */
        .task5-container {
            display: none;
            width: 100%;
        }

        .task5-counter-title {
            color: #1f8195;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .task5-counter-num {
            color: #1f8195;
            font-size: 54px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .task5-btn-group {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }

        .task5-btn-group .btn {
            margin-bottom: 0;
            font-size: 18px;
            height: 52px;
        }

        .btn-add-count {
            background-color: #1f8195;
            box-shadow: 0 6px 15px rgba(31, 129, 149, 0.3);
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
        
    <div id="global-header" style="display: none;">
        <div class="top-time-bar" id="real-time">00:00:00</div>
        <div class="info-bar">
            <div id="display-player-name">玩家名稱</div>
            <div id="display-score">積分：0000</div>
        </div>
    </div>

    <div class="content-body">

        <div id="home-view" class="card">
            <h2>玩家名稱</h2>
            <input type="text" id="player-name" class="input-field" placeholder="請輸入名字..." autocomplete="off">
            <button class="btn" onclick="loginGame()" style="margin-bottom:0;">登入遊戲</button>
        </div>

        <div id="ready-view" class="card">
            <div class="timer-label">尚餘時間</div>
            <div class="timer-display" id="ready-clock">00:20:00</div>
            <button class="btn" onclick="startGameClock()" style="margin-bottom:0;">開始遊戲</button>
        </div>

        <div id="scan-view" class="card">
            <div class="timer-label">尚餘時間</div>
            <div class="timer-display" id="scan-clock">00:20:00</div>
            <div class="scanner-box" id="reader"></div>
            <div class="status-bar" id="indicator-bar"></div>
            <button class="btn btn-blue">請將鏡頭對準 QR Code</button>
        </div>

        <div id="task-view" class="card">
            <div class="timer-label">尚餘時間</div>
            <div class="timer-display" id="task-clock">00:20:00</div>
            
            <div class="task-header" id="task-id-label">Task 1</div>
            <div class="task-title" id="task-main-title">標題</div>
            <div class="task-description" id="task-desc">描述</div>
            
            <button id="task-upload-btn" class="btn btn-upload" onclick="openExternalForm()">上 載</button>
            <input type="text" id="task-password-input" class="input-field" placeholder="輸入密碼" oninput="checkPasswordAuto(this)" autocomplete="off">
            <button id="task-verify-btn" class="btn" onclick="checkPasswordManual()">核對答案</button>
            
            <div id="task3-birthday-box" class="birthday-container">
                <div class="birthday-label-row">
                    <div style="width: 46%; text-align: center;">Unity團隊</div>
                    <div style="width: 46%; text-align: center;">生日日期 (MM/DD)</div>
                </div>
                
                <div class="birthday-row">
                    <div class="birthday-inputs">
                        <input type="text" id="t3-name-1" class="birthday-input" placeholder="名字" oninput="verifyTask3Progress()" autocomplete="off">
                        <input type="text" id="t3-date-1" class="birthday-input" placeholder="0101" oninput="verifyTask3Progress()" autocomplete="off">
                    </div>
                    <div id="t3-line-1" class="birthday-line"></div>
                </div>
                
                <div class="birthday-row">
                    <div class="birthday-inputs">
                        <input type="text" id="t3-name-2" class="birthday-input" placeholder="名字" oninput="verifyTask3Progress()" autocomplete="off">
                        <input type="text" id="t3-date-2" class="birthday-input" placeholder="0202" oninput="verifyTask3Progress()" autocomplete="off">
                    </div>
                    <div id="t3-line-2" class="birthday-line"></div>
                </div>
                
                <div class="birthday-row">
                    <div class="birthday-inputs">
                        <input type="text" id="t3-name-3" class="birthday-input" placeholder="名字" oninput="verifyTask3Progress()" autocomplete="off">
                        <input type="text" id="t3-date-3" class="birthday-input" placeholder="0303" oninput="verifyTask3Progress()" autocomplete="off">
                    </div>
                    <div id="t3-line-3" class="birthday-line"></div>
                </div>
            </div>

            <div id="task4-scanner-box" class="task4-scanner-container">
                <div class="scanner-box" id="task4-reader"></div>
                <div class="status-bar" id="task4-indicator-bar"></div>
            </div>

            <div id="task5-box" class="task5-container">
                <div id="task5-page1">
                    <div class="task5-counter-title">答對題目數目</div>
                    <div class="task5-counter-num" id="task5-score-counter">00</div>
                    <div class="task5-btn-group">
                        <button class="btn btn-add-count" onclick="addTask5Count()">答對一題</button>
                        <button class="btn" onclick="switchTask5ToPage2()">成功</button>
                    </div>
                </div>
                <div id="task5-page2" style="display: none;">
                    <div class="scanner-box" id="task5-reader"></div>
                    <div class="status-bar" id="task5-indicator-bar"></div>
                </div>
            </div>
            
            <div class="task-footer-info">
                <div class="points-award" id="task-points-label">完成可獲 200 分</div>
                <button class="btn-back" onclick="cleanAndBackToScan()">返回掃描</button>
            </div>
        </div>

    </div>

    <script>
        // 🎮 遊戲核心關卡資料庫 (完整整合 Task 1, 2, 3, 4, 5)
        const taskDatabase = {
            "001": { 
                id: "Task 1", 
                title: "攝影 Pro Max", 
                desc: "請拍攝你自己與芒果樹的合照並上載至Google Form", 
                url: "https://docs.google.com/forms/d/e/1FAIpQLSf9LMqvC9gSHjg4H0oHexYyGiyNE_rdfBm2lqJduYfh_fpGKA/viewform?usp=dialog", 
                password: "2847", 
                points: 200,
                type: "auto" 
            },
            "002": {
                id: "Task 2",
                title: "Eye 瘋",
                desc: "請數出義社社borad上共有多少人頭。",
                url: "",
                password: "25",
                points: 200,
                type: "manual" 
            },
            "003": {
                id: "Task 3",
                title: "Happy birthday",
                desc: "請回答3位Unity團隊生日日期",
                points: 100,
                type: "birthday",
                answers: [
                    { name: "a", date: "0101" }, 
                    { name: "b", date: "0202" }, 
                    { name: "c", date: "0303" }  
                ]
            },
            "004": {
                id: "Task 4",
                title: "Bottle Flip",
                desc: "完成後 請掃描 Admin code 加分",
                points: 100,
                type: "admin_scan",
                admins: { "kit": "Kit", "suki": "Suki" }
            },
            "005": {
                id: "Task 5",
                title: "媽媽今天不必擔心我~",
                desc: "主持人會比一個特定字，參賽者需要唱出兩句含有該字的歌詞 (夠→主能夠~主能夠~)",
                points: 100,
                type: "sing_challenge",
                admins: { "kit": "Kit", "suki": "Suki" }
            }
        };

        let currentScore = 0;
        let html5QrcodeScanner = null;
        let task4QrcodeScanner = null; 
        let task5QrcodeScanner = null; 
        let countdownInterval = null;
        let timeLeftSeconds = 20 * 60; 
        let finishedTasksLog = {}; 
        let isProcessingScan = false; 
        let currentActiveTaskKey = null; 
        let task5CorrectCount = 0; 

        // --- 1. 頂部實時時鐘 ---
        function updateRealTime() {
            const now = new Date();
            document.getElementById('real-time').innerText = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }
        setInterval(updateRealTime, 1000);
        updateRealTime();

        // --- 2. 玩家登入 ---
        function loginGame() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert("請輸入名字！");
            document.getElementById('display-player-name').innerText = name;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('global-header').style.display = 'block';
            document.getElementById('ready-view').style.display = 'block';
        }

        // --- 3. 開始遊戲 ---
        function startGameClock() {
            document.getElementById('ready-view').style.display = 'none';
            document.getElementById('scan-view').style.display = 'block';
            startCountdown(); 
            initCamera();     
        }

        // --- 4. 初始化主相機 ---
        function initCamera() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.start(
                    { facingMode: "environment" }, 
                    { fps: 20, qrbox: (w, h) => ({ width: w * 0.8, height: h * 0.8 }) },
                    (decodedText) => { handleScanResult(decodedText.trim()); }, 
                    () => {}  
                ).catch(err => console.error(err));
                return;
            }
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 20, qrbox: (w, h) => ({ width: w * 0.8, height: h * 0.8 }) },
                (decodedText) => { handleScanResult(decodedText.trim()); }, 
                () => {}  
            ).catch(err => { alert("請確保開啟相機權限！"); });
        }

        // --- 5. 主掃描解讀與界面分流切換 ---
        function handleScanResult(codeText) {
            if (isProcessingScan) return; 
            const lowerCode = codeText.toLowerCase();

            if (lowerCode === 'reset') {
                isProcessingScan = true;
                resetWholeGame();
                isProcessingScan = false;
                return;
            }

            if (taskDatabase[lowerCode]) {
                isProcessingScan = true;
                
                if (finishedTasksLog[lowerCode]) {
                    alert(`這個任務你已經大功告成，拿過分數囉！請去挑戰其他關卡。`);
                    setTimeout(() => { isProcessingScan = false; }, 2000);
                    return;
                }

                currentActiveTaskKey = lowerCode;
                const data = taskDatabase[lowerCode];
                
                document.getElementById('task-id-label').innerText = data.id;
                document.getElementById('task-main-title').innerText = data.title;
                document.getElementById('task-desc').innerText = data.desc;
                document.getElementById('task-points-label').innerText = `完成可獲 ${data.points} 分`;
                
                // 重置先前關卡的輸入與狀態
                document.getElementById('task-password-input').value = ""; 
                for(let i=1; i<=3; i++){
                    document.getElementById(`t3-name-${i}`).value = "";
                    document.getElementById(`t3-date-${i}`).value = "";
                    document.getElementById(`t3-line-${i}`).classList.remove('correct');
                }
                // 重置 Task 5 專屬狀態
                task5CorrectCount = 0;
                document.getElementById('task5-score-counter').innerText = "00";
                document.getElementById('task5-page1').style.display = "block";
                document.getElementById('task5-page2').style.display = "none";

                // 所有關卡版面動態切換
                if (data.type === "auto") {
                    setElementsDisplay("block", "block", "none", "none", "none", "none");
                    document.getElementById('task-password-input').placeholder = "輸入密碼";
                } else if (data.type === "manual") {
                    setElementsDisplay("none", "block", "block", "none", "none", "none");
                    document.getElementById('task-password-input').placeholder = "輸入欄";
                } else if (data.type === "birthday") {
                    setElementsDisplay("none", "none", "none", "block", "none", "none");
                } else if (data.type === "admin_scan") {
                    setElementsDisplay("none", "none", "none", "none", "block", "none");
                } else if (data.type === "sing_challenge") {
                    setElementsDisplay("none", "none", "none", "none", "none", "block");
                }

                if (html5QrcodeScanner) {
                    html5QrcodeScanner.stop().then(() => {
                        document.getElementById('scan-view').style.display = 'none';
                        document.getElementById('task-view').style.display = 'block';
                        isProcessingScan = false;

                        // 特殊相機立即開啟偵測
                        if (data.type === "admin_scan") {
                            initTask4AdminCamera();
                        }
                    }).catch(() => { isProcessingScan = false; });
                }
            } else {
                isProcessingScan = true;
                triggerScanFailure('indicator-bar');
                setTimeout(() => { isProcessingScan = false; }, 3000);
            }
        }

        function setElementsDisplay(upload, pwdInput, verifyBtn, t3Box, t4Box, t5Box) {
            document.getElementById('task-upload-btn').style.display = upload;
            document.getElementById('task-password-input').style.display = pwdInput;
            document.getElementById('task-verify-btn').style.display = verifyBtn;
            document.getElementById('task3-birthday-box').style.display = t3Box;
            document.getElementById('task4-scanner-box').style.display = t4Box;
            document.getElementById('task5-box').style.display = t5Box;
        }

        function triggerScanFailure(barId) {
            const bar = document.getElementById(barId);
            if(bar) {
                bar.classList.add('error');
                setTimeout(() => { bar.classList.remove('error'); }, 3000);
            }
        }

        function openExternalForm() {
            if (!currentActiveTaskKey) return;
            const targetUrl = taskDatabase[currentActiveTaskKey].url;
            if(targetUrl) window.open(targetUrl, '_blank'); 
        }

        // --- 6. Task 4：專屬內置 Admin 相機與驗證 ---
        function initTask4AdminCamera() {
            if (task4QrcodeScanner) {
                task4QrcodeScanner.start({ facingMode: "environment" }, { fps: 20, qrbox: (w, h) => ({ width: w * 0.8, height: h * 0.8 }) }, (decodedText) => { handleAdmin4ScanResult(decodedText.trim()); }, () => {}).catch(err => console.error(err));
                return;
            }
            task4QrcodeScanner = new Html5Qrcode("task4-reader");
            task4QrcodeScanner.start({ facingMode: "environment" }, { fps: 20, qrbox: (w, h) => ({ width: w * 0.8, height: h * 0.8 }) }, (decodedText) => { handleAdmin4ScanResult(decodedText.trim()); }, () => {}).catch(err => { console.error(err); });
        }

        function handleAdmin4ScanResult(codeText) {
            if (!currentActiveTaskKey) return;
            const data = taskDatabase[currentActiveTaskKey];
            const lowerAdminCode = codeText.toLowerCase();

            if (data.admins[lowerAdminCode]) {
                const adminName = data.admins[lowerAdminCode];
                if (task4QrcodeScanner) {
                    task4QrcodeScanner.stop().then(() => { executeAdminSuccess(adminName, data.points); });
                }
            } else {
                triggerScanFailure('task4-indicator-bar');
            }
        }


        // --- 7. Task 5：專屬雙頁面計數與動態相機驗證 ---
        function addTask5Count() {
            task5CorrectCount++;
            document.getElementById('task5-score-counter').innerText = String(task5CorrectCount).padStart(2, '0');
        }

        function switchTask5ToPage2() {
            document.getElementById('task-desc').innerText = "請用 Admin code 加分";
            document.getElementById('task5-page1').style.display = "none";
            document.getElementById('task5-page2').style.display = "block";
            initTask5AdminCamera();
        }

        function initTask5AdminCamera() {
            if (task5QrcodeScanner) {
                task5QrcodeScanner.start({ facingMode: "environment" }, { fps: 20, qrbox: (w, h) => ({ width: w * 0.8, height: h * 0.8 }) }, (decodedText) => { handleAdmin5ScanResult(decodedText.trim()); }, () => {}).catch(err => console.error(err));
                return;
            }
            task5QrcodeScanner = new Html5Qrcode("task5-reader");
            task5QrcodeScanner.start({ facingMode: "environment" }, { fps: 20, qrbox: (w, h) => ({ width: w * 0.8, height: h * 0.8 }) }, (decodedText) => { handleAdmin5ScanResult(decodedText.trim()); }, () => {}).catch(err => { console.error(err); });
        }

        function handleAdmin5ScanResult(codeText) {
            if (!currentActiveTaskKey) return;
            const data = taskDatabase[currentActiveTaskKey];
            const lowerAdminCode = codeText.toLowerCase();

            if (data.admins[lowerAdminCode]) {
                const adminName = data.admins[lowerAdminCode];
                if (task5QrcodeScanner) {
                    task5QrcodeScanner.stop().then(() => { executeAdminSuccess(adminName, data.points); });
                }
            } else {
                triggerScanFailure('task5-indicator-bar');
            }
        }

        function executeAdminSuccess(adminName, points) {
            currentScore += points;
            document.getElementById('display-score').innerText = `積分：${String(currentScore).padStart(4, '0')}`;
            finishedTasksLog[currentActiveTaskKey] = true; 
            alert(`🎉 成功通關！由 Admin ${adminName} 幫你加了 ${points} 分！`);
            cleanAndBackToScan();
        }


        // --- 8. 🔑 密碼比對與 Task 3 生日功能 ---
        function checkPasswordAuto(inputElement) {
            if (!currentActiveTaskKey) return;
            const data = taskDatabase[currentActiveTaskKey];
            if (data.type !== "auto") return; 
            if (inputElement.value.trim() === data.password) { executeTaskSuccess(data.points); }
        }

        function checkPasswordManual() {
            if (!currentActiveTaskKey) return;
            const data = taskDatabase[currentActiveTaskKey];
            const userTyped = document.getElementById('task-password-input').value.trim();
            if (userTyped === data.password) { executeTaskSuccess(data.points); } else { alert("❌ 答案不正確，再數一次試試看！"); }
        }

        function verifyTask3Progress() {
            if (!currentActiveTaskKey) return;
            const data = taskDatabase[currentActiveTaskKey];
            if (data.type !== "birthday") return;

            let step1Correct = false, step2Correct = false, step3Correct = false;

            const n1 = document.getElementById('t3-name-1').value.trim().toLowerCase();
            const d1 = document.getElementById('t3-date-1').value.trim();
            if (n1 === data.answers[0].name.toLowerCase() && d1 === data.answers[0].date) {
                document.getElementById('t3-line-1').classList.add('correct'); step1Correct = true;
            } else { document.getElementById('t3-line-1').classList.remove('correct'); }

            if (step1Correct) {
                const n2 = document.getElementById('t3-name-2').value.trim().toLowerCase();
                const d2 = document.getElementById('t3-date-2').value.trim();
                if (n2 === data.answers[1].name.toLowerCase() && d2 === data.answers[1].date) {
                    document.getElementById('t3-line-2').classList.add('correct'); step2Correct = true;
                } else { document.getElementById('t3-line-2').classList.remove('correct'); }
            } else { document.getElementById('t3-line-2').classList.remove('correct'); }

            if (step1Correct && step2Correct) {
                const n3 = document.getElementById('t3-name-3').value.trim().toLowerCase();
                const d3 = document.getElementById('t3-date-3').value.trim();
                if (n3 === data.answers[2].name.toLowerCase() && d3 === data.answers[2].date) {
                    document.getElementById('t3-line-3').classList.add('correct'); step3Correct = true;
                } else { document.getElementById('t3-line-3').classList.remove('correct'); }
            } else { document.getElementById('t3-line-3').classList.remove('correct'); }

            if (step1Correct && step2Correct && step3Correct) {
                setTimeout(() => { executeTaskSuccess(data.points); }, 300);
            }
        }

        function executeTaskSuccess(points) {
            currentScore += points;
            document.getElementById('display-score').innerText = `積分：${String(currentScore).padStart(4, '0')}`;
            finishedTasksLog[currentActiveTaskKey] = true; 
            alert(`🎉 恭喜成功通關！獲得 ${points} 分！`);
            cleanAndBackToScan();
        }

        function cleanAndBackToScan() {
            if (task4QrcodeScanner) { task4QrcodeScanner.stop().catch(() => {}); }
            if (task5QrcodeScanner) { task5QrcodeScanner.stop().catch(() => {}); }
            document.getElementById('task-view').style.display = 'none';
            document.getElementById('scan-view').style.display = 'block';
            currentActiveTaskKey = null;
            initCamera();
        }
// --- 9. 重置遊戲 ---
        function resetWholeGame() {
            clearInterval(countdownInterval);
            currentScore = 0; timeLeftSeconds = 20 * 60; finishedTasksLog = {}; currentActiveTaskKey = null;
            document.getElementById('display-score').innerText = `積分：0000`;
            alert("🔄 所有積分、計時以及任務紀錄已全部重置！");
            window.location.reload();
        }

        // --- 10. 倒數計時計時器 ---
        function startCountdown() {
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                if (timeLeftSeconds <= 0) { clearInterval(countdownInterval); alert("遊戲時間到！"); return; }
                timeLeftSeconds--;
                const hrs = String(Math.floor(timeLeftSeconds / 3600)).padStart(2, '0');
                const mins = String(Math.floor((timeLeftSeconds % 3600) / 60)).padStart(2, '0');
                const secs = String(timeLeftSeconds % 60).padStart(2, '0');
                const timeStr = `${hrs}:${mins}:${secs}`;
                document.getElementById('ready-clock').innerText = timeStr;
                document.getElementById('scan-clock').innerText = timeStr;
                document.getElementById('task-clock').innerText = timeStr; 
            }, 1000);
        }
    </script>
</body>
</html>
