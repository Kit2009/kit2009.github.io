 <!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>實境冒險遊戲</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f7f4eb;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png'); /* 請確保背景圖片名稱為 bg.png */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
        }

        /* 頂部深藍綠色實時時間狀態欄 */
        .top-time-bar {
            background-color: #1f8195;
            color: #ffffff;
            text-align: center;
            padding: 12px 0;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            width: 100%;
            z-index: 10;
        }

        /* 玩家資訊與積分狀態列 */
        .info-bar {
            background-color: #f4efe2;
            color: #111111;
            display: flex;
            justify-content: space-between;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 10;
        }

        /* 主要卡片容器 */
        .content-body {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 半透明淡青綠色圓角卡片 */
        .card {
            background-color: rgba(225, 241, 239, 0.85);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 畫面切換控制 */
        #home-view { display: block; }
        #ready-view { display: none; }
        #scan-view { display: none; }
        #task-view { display: none; }

        .card h2 {
            color: #111111;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .input-field {
            width: 100%;
            height: 54px;
            border: none;
            background-color: #ffffff;
            border-radius: 20px;
            padding: 0 20px;
            font-size: 18px;
            text-align: center;
            color: #333;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
            outline: none;
            margin-bottom: 30px;
        }

        /* 經典綠色大按鈕 */
        .btn {
            width: 100%;
            height: 56px;
            border: none;
            background-color: #00a854;
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 168, 84, 0.3);
            transition: background-color 0.2s, transform 0.1s;
        }

        /* 掃描介面的藍綠色提示鈕 */
        .btn-blue {
            background-color: #1f8195;
            box-shadow: 0 6px 15px rgba(31, 129, 149, 0.3);
            cursor: default;
        }

        /* Task 頁面專屬：粉紫色上載按鈕 */
        .btn-upload {
            background-color: #e2a4f4;
            color: #000000;
            box-shadow: 0 6px 15px rgba(226, 164, 244, 0.4);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 35px;
        }

        /* 返回掃描紅橘色小按鈕 */
        .btn-back {
            display: inline-block;
            width: auto;
            height: auto;
            padding: 8px 18px;
            background-color: #ff6b6b;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
            border: none;
            cursor: pointer;
        }

        .btn:active, .btn-back:active {
            transform: scale(0.97);
        }

        /* ⏳ 倒數計時器排版與顏色 */
        .timer-label {
            color: #1f8195;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .timer-display {
            color: #1f8195;
            font-size: 46px;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* 📷 相機正方形黑色框 */
        .scanner-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #000000;
            border-radius: 24px;
            overflow: hidden;
            margin: 0 auto 25px auto;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        /* 隱藏 html5-qrcode 內部自帶的 UI 元件 */
        #reader button { display: none !important; }
        #reader img { display: none !important; }
        #reader { border: none !important; }

        /* 🟢🔴 下方動態長條 */
        .status-bar {
            width: 100%;
            height: 10px;
            background-color: #00a854; 
            border-radius: 5px;
            margin-bottom: 25px;
            transition: background-color 0.3s ease;
        }

        .status-bar.error {
            background-color: #d93838; 
        }

        /* --- Task 關卡畫面專屬排版樣式 --- */
        .task-header {
            text-align: left;
            color: #1f8195;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .task-title {
            text-align: left;
            color: #1f8195;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .task-description {
            text-align: left;
            color: #1f8195;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .task-footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 10px;
        }

        .points-award {
            color: #1f8195;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="bg-container">
        
        <div id="global-header" style="display: none;">
            <div class="top-time-bar" id="real-time">00:00:00</div>
            <div class="info-bar">
                <div id="display-player-name">玩家名稱</div>
                <div id="display-score">積分：0000</div>
            </div>
        </div>

        <div class="content-body">

            <div id="home-view" class="card">
                <h2>玩家名稱</h2>
                <input type="text" id="player-name" class="input-field" placeholder="請輸入名字..." autocomplete="off">
                <button class="btn" onclick="loginGame()">登入遊戲</button>
            </div>

            <div id="ready-view" class="card">
                <div class="timer-label">尚餘時間</div>
                <div class="timer-display" id="ready-clock">00:20:00</div>
                <button class="btn" onclick="startGameClock()">開始遊戲</button>
            </div>

            <div id="scan-view" class="card">
                <div class="timer-label">尚餘時間</div>
                <div class="timer-display" id="scan-clock">00:20:00</div>
                
                <div class="scanner-box" id="reader"></div>
                
                <div class="status-bar" id="indicator-bar"></div>
                
                <button class="btn btn-blue">請將鏡頭對準 QR Code</button>
            </div>

            <div id="task-view" class="card">
                <div class="timer-label">尚餘時間</div>
                <div class="timer-display" id="task-clock">00:20:00</div>
                
                <div class="task-header" id="task-id-label">Task 1</div>
                <div class="task-title" id="task-main-title">攝影 Pro Max</div>
                <div class="task-description" id="task-desc">請拍攝你自己與芒果樹的合照並上載至Google Form</div>
                
                <button class="btn btn-upload" onclick="openExternalForm()">上 載</button>
                <input type="text" id="task-password-input" class="input-field" placeholder="輸入密碼" oninput="checkPasswordAuto(this)" autocomplete="off">
                
                <div class="task-footer-info">
                    <div class="points-award" id="task-points-label">完成可獲 200 分</div>
                    <button class="btn-back" onclick="backToScan()">返回掃描</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 關卡與資料庫設定（已更新 Google Form 連結）
        const taskDatabase = {
            "001": { 
                id: "Task 1", 
                title: "攝影 Pro Max", 
                desc: "請拍攝你自己與芒果樹的合照並上載至Google Form", 
                url: "https://docs.google.com/forms/d/e/1FAIpQLSf9LMqvC9gSHjg4H0oHexYyGiyNE_rdfBm2lqJduYfh_fpGKA/viewform?usp=dialog", 
                password: "2847", 
                points: 200 
            }
        };

        let currentScore = 0;
        let html5QrcodeScanner = null;
        let countdownInterval = null;
        let timeLeftSeconds = 20 * 60; 
        let finishedTasksLog = {}; 
        let isProcessingScan = false; 
        let currentActiveTaskKey = null; 

        // --- 1. 頂部實時時鐘功能 ---
        function updateRealTime() {
            const now = new Date();
            document.getElementById('real-time').innerText = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }
        setInterval(updateRealTime, 1000);
        updateRealTime();

        // --- 2. 畫面一：玩家登入邏輯 ---
        function loginGame() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert("請輸入名字！");
            
            document.getElementById('display-player-name').innerText = name;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('global-header').style.display = 'block';
            document.getElementById('ready-view').style.display = 'block';
        }

        // --- 3. 畫面二：點擊「開始遊戲」，立刻開展倒數計時並換頁 ---
        function startGameClock() {
            document.getElementById('ready-view').style.display = 'none';
            document.getElementById('scan-view').style.display = 'block';
            
            startCountdown(); 
            initCamera();     
        }

        // --- 4. 初始化並開啟相機鏡頭 ---
        function initCamera() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.start(
                    { facingMode: "environment" }, 
                    { fps: 20, qrbox: (w, h) => ({ width: w * 0.8, height: h * 0.8 }) },
                    (decodedText) => { handleScanResult(decodedText.trim()); }, 
                    () => {}  
                ).catch(err => console.error("鏡頭啟動錯誤:", err));
                return;
            }

            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 20, qrbox: (w, h) => ({ width: w * 0.8, height: h * 0.8 }) },
                (decodedText) => {
                    handleScanResult(decodedText.trim());
                }, 
                () => {}  
            ).catch(err => {
                console.error("相機無法正常開啟: ", err);
                alert("請確保網址使用的是 https 連線，並已允許相機權限！");
            });
        }

        // --- 5. 🧠 判斷與解讀 QR 碼內容 ---
        function handleScanResult(codeText) {
            if (isProcessingScan) return; 
            
            const lowerCode = codeText.toLowerCase();

            // 🔄 重置指令判定
            if (lowerCode === 'reset') {
                isProcessingScan = true;
                resetWholeGame();
                isProcessingScan = false;
                return;
            }

            // 🎯 判定任務碼
            if (taskDatabase[lowerCode]) {
                isProcessingScan = true;
                
                // 🛑 防重複限制檢查
                if (finishedTasksLog[lowerCode]) {
                    alert(`這個任務你已經大功告成，拿過分數囉！請去挑戰其他關卡。`);
                    setTimeout(() => { isProcessingScan = false; }, 2000);
                    return;
                }

                currentActiveTaskKey = lowerCode;
                const data = taskDatabase[lowerCode];
                
                document.getElementById('task-id-label').innerText = data.id;
                document.getElementById('task-main-title').innerText = data.title;
                document.getElementById('task-desc').innerText = data.desc;
                document.getElementById('task-points-label').innerText = `完成可獲 ${data.points} 分`;
                document.getElementById('task-password-input').value = ""; 

                if (html5QrcodeScanner) {
                    html5QrcodeScanner.stop().then(() => {
                        document.getElementById('scan-view').style.display = 'none';
                        document.getElementById('task-view').style.display = 'block';
                        isProcessingScan = false;
                    }).catch(err => {
                        console.error(err);
                        isProcessingScan = false;
                    });
                }
            } else {
                isProcessingScan = true;
                triggerScanFailure();
                setTimeout(() => { isProcessingScan = false; }, 3000);
            }
        }

        // --- 6. 🔴 掃描失敗反饋 ---
        function triggerScanFailure() {
            const bar = document.getElementById('indicator-bar');
            bar.classList.add('error');
            setTimeout(() => { bar.classList.remove('error'); }, 3000);
        }

        // --- 7. Task 頁面功能：點擊「上載」按鈕跳轉外部 Google Form ---
        function openExternalForm() {
            if (!currentActiveTaskKey) return;
            const targetUrl = taskDatabase[currentActiveTaskKey].url;
            window.open(targetUrl, '_blank'); 
        }

        // --- 8. 🔑 密碼自動即時檢測系統 ---
        function checkPasswordAuto(inputElement) {
            if (!currentActiveTaskKey) return;
            
            const currentCorrectPassword = taskDatabase[currentActiveTaskKey].password;
            const userTyped = inputElement.value.trim();

            if (userTyped === currentCorrectPassword) {
                const awardedPoints = taskDatabase[currentActiveTaskKey].points;
                
                currentScore += awardedPoints;
                const formattedScore = String(currentScore).padStart(4, '0');
                document.getElementById('display-score').innerText = `積分：${formattedScore}`;

                finishedTasksLog[currentActiveTaskKey] = true;
                
                alert(`🎉 密碼解鎖正確！恭喜獲得 ${awardedPoints} 分！`);
                
                backToScan();
            }
        }

        function backToScan() {
            document.getElementById('task-view').style.display = 'none';
            document.getElementById('scan-view').style.display = 'block';
            currentActiveTaskKey = null;
            initCamera();
        }

        // --- 9. 🔄 重置遊戲功能 ---
        function resetWholeGame() {
            clearInterval(countdownInterval);

            currentScore = 0;
            timeLeftSeconds = 20 * 60; 
            finishedTasksLog = {}; 
            currentActiveTaskKey = null;
            
            document.getElementById('display-score').innerText = `積分：0000`;
            document.getElementById('ready-clock').innerText = "00:20:00";
            document.getElementById('scan-clock').innerText = "00:20:00";
            document.getElementById('task-clock').innerText = "00:20:00";

            alert("🔄 遊戲管理員指令：所有積分、計時以及任務紀錄已全部重置！");

            document.getElementById('scan-view').style.display = 'none';
            document.getElementById('task-view').style.display = 'none';
            document.getElementById('ready-view').style.display = 'block';
            
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().catch(() => {});
            }
            
            window.location.reload();
        }

        // --- ⏳ 20 分鐘倒數計時 ---
        function startCountdown() {
            clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                if (timeLeftSeconds <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('ready-clock').innerText = "00:00:00";
                    document.getElementById('scan-clock').innerText = "00:00:00";
                    document.getElementById('task-clock').innerText = "00:00:00";
                    alert("遊戲時間到！");
                    return;
                }
                timeLeftSeconds--;
                
                const hrs = String(Math.floor(timeLeftSeconds / 3600)).padStart(2, '0');
                const mins = String(Math.floor((timeLeftSeconds % 3600) / 60)).padStart(2, '0');
                const secs = String(timeLeftSeconds % 60).padStart(2, '0');
                
                const timeStr = `${hrs}:${mins}:${secs}`;
                
                document.getElementById('ready-clock').innerText = timeStr;
                document.getElementById('scan-clock').innerText = timeStr;
                document.getElementById('task-clock').innerText = timeStr; 
            }, 1000);
        }
    </script>
</body>
</html>
